server:
  port: 8081

spring:
  application:
    name: student-management-system-qa

  datasource:
    url: jdbc:h2:mem:qadb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

logging:
  level:
    root: INFO
    com.sridhar.springboot: INFO